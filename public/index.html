<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONETOONE.booking - Réservation de logements</title>
<link rel="icon" type="image/png" href="/icon-header-2.png">
<link rel="apple-touch-icon" href="/icon-header-2.png">
<style>
:root {
  --primary: #ff385c; --primary-dark: #e31c5f;
  --bg: #f7f7f7; --card-bg: #fff;
  --text: #222; --text-light: #717171;
  --border: #eee; --shadow: 0 1px 3px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.1);
  --radius: 14px; --radius-sm: 10px;
  --font: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}
button{cursor:pointer;font-family:inherit;font-size:inherit;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:inherit;width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);outline:0;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--text)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 22px;border-radius:var(--radius-sm);font-weight:500;transition:all .2s;white-space:nowrap;font-size:14px}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 1px 4px rgba(255,56,92,.3)}.btn-primary:hover{background:var(--primary-dark);box-shadow:0 2px 8px rgba(255,56,92,.4)}
.btn-outline{border:1.5px solid var(--border);color:var(--text);background:transparent}.btn-outline:hover{border-color:var(--text);background:rgba(0,0,0,.02)}
.btn-ghost{color:var(--text);border-radius:24px}.btn-ghost:hover{background:rgba(0,0,0,.05)}
.btn-sm{padding:7px 16px;font-size:13px}
.btn-icon{width:38px;height:38px;padding:0;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}

/* ─── Header ─── */
header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 24px;backdrop-filter:blur(12px);background:rgba(255,255,255,.96)}
.header-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:80px}
.logo{display:flex;align-items:center}
.logo img{height:80px;width:auto;display:block}
.header-right{display:flex;align-items:center;gap:8px}
.header-right .btn-ghost{border-radius:24px;padding:8px 16px}
.user-menu{position:relative}
.user-btn{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:24px;padding:6px 8px 6px 16px;transition:box-shadow .2s}
.user-btn:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.user-btn .avatar{width:30px;height:30px;border-radius:50%;background:var(--text-light);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.dropdown{position:absolute;top:calc(100% + 10px);right:0;background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.12);min-width:230px;opacity:0;visibility:hidden;transform:translateY(-8px) scale(.98);transition:all .2s cubic-bezier(.25,.46,.45,.94);z-index:200;padding:8px;border:1px solid var(--border)}
.dropdown.open{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.dropdown .dropdown-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:background .15s}
.dropdown .dropdown-item:hover{background:var(--bg)}
.dropdown hr{margin:6px 0;border:none;border-top:1px solid var(--border)}
.dropdown .badge{background:var(--primary);color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;display:inline-flex;align-items:center;justify-content:center;margin-left:auto}

/* ─── Verification banner ─── */
.verify-banner{background:#fef3c7;border-bottom:1px solid #fde68a;padding:10px 24px;text-align:center;font-size:14px;color:#92400e;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.verify-banner a{color:#92400e;font-weight:600;text-decoration:underline;cursor:pointer}
.verify-banner a:hover{color:#78350f}

/* ─── Hero ─── */
.hero{background:linear-gradient(135deg,#ff385c 0%,#d61f4f 50%,#8b1a4a 100%);color:#fff;padding:64px 24px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(255,255,255,.06) 0%,transparent 50%);pointer-events:none}
.hero h1{font-size:44px;font-weight:800;margin-bottom:12px;letter-spacing:-.5px}
.hero p{font-size:17px;opacity:.92;max-width:580px;margin:0 auto 28px;line-height:1.6}
.hero .search-box{display:flex;max-width:520px;margin:0 auto;background:#fff;border-radius:50px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.25)}
.hero .search-box input{border:none;padding:14px 22px;flex:1;font-size:16px}
.hero .search-box input::placeholder{color:#aaa}
.hero .search-box button{background:var(--primary);color:#fff;padding:14px 28px;font-weight:600;font-size:15px;border-radius:0 50px 50px 0;transition:background .2s}
.hero .search-box button:hover{background:var(--primary-dark)}

/* ─── Mobile search ─── */
.mobile-search{display:none;padding:12px 16px;background:#fff;border-bottom:1px solid var(--border)}
.mobile-search .search-box{display:flex;background:var(--bg);border-radius:24px;overflow:hidden;border:1px solid var(--border)}
.mobile-search .search-box input{border:none;background:transparent;padding:10px 14px;flex:1;font-size:14px}
.mobile-search .search-box button{background:var(--primary);color:#fff;padding:10px 14px}

/* ─── Categories ─── */
.categories{background:#fff;border-bottom:1px solid var(--border)}
.categories-inner{max-width:1440px;margin:0 auto;padding:16px 24px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.categories-inner::-webkit-scrollbar{display:none}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 16px;border-radius:10px;white-space:nowrap;font-size:12px;color:var(--text-light);transition:all .2s;flex-shrink:0;border:none;background:transparent;position:relative}
.cat-btn::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--primary);border-radius:2px;transition:width .25s}
.cat-btn:hover{color:var(--text);background:rgba(0,0,0,.03)}
.cat-btn.active{color:var(--primary)}
.cat-btn.active::after{width:20px}
.cat-btn .cat-icon{font-size:24px;margin-bottom:2px}

/* ─── Main content ─── */
main{max-width:1440px;margin:0 auto;padding:24px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.section-header h2{font-size:26px;font-weight:700;letter-spacing:-.3px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap}

/* ─── Listings grid ─── */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:800px 100%;animation:shimmer 1.5s infinite}
.skeleton-card .skeleton-img{width:100%;padding-top:66%;border-radius:var(--radius);margin-bottom:12px}
.skeleton-card .skeleton-line{height:14px;border-radius:4px;margin-bottom:8px}.skeleton-card .skeleton-line:last-child{width:60%}

.listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:8px}
.listing-card{background:var(--card-bg);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .25s cubic-bezier(.25,.46,.45,.94),box-shadow .25s ease;border:1px solid var(--border)}
.listing-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.listing-card .img-wrap{position:relative;padding-top:66%;overflow:hidden;background:#eee}
.listing-card .img-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:transform .4s;opacity:0}
.listing-card .img-wrap img.loaded{opacity:1}
.listing-card:hover .img-wrap img{transform:scale(1.05)}
.listing-card .superhost-badge{position:absolute;top:10px;left:10px;background:var(--primary);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px}
.listing-card .fav-btn{position:absolute;top:10px;right:10px;background:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 6px rgba(0,0,0,.15);opacity:0;transition:opacity .3s}
.listing-card:hover .fav-btn{opacity:1}
.listing-card .card-body{padding:14px}
.listing-card .card-body .card-title{font-weight:600;font-size:15px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.listing-card .card-body .card-sub{font-size:13px;color:var(--text-light);margin-bottom:6px}
.listing-card .card-body .card-price{font-weight:600;font-size:15px}
.listing-card .card-body .card-price span{font-weight:400;color:var(--text-light);font-size:13px}
.listing-card .card-body .card-rating{display:flex;align-items:center;gap:4px;font-size:13px}

/* ─── Fade in animation ─── */
.fade-in{opacity:0;transform:translateY(12px);transition:opacity .5s ease,transform .5s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* ─── Modal ─── */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .25s;padding:20px}
.modal-overlay.open{opacity:1;visibility:visible}
.modal{background:#fff;border-radius:16px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(20px) scale(.97);transition:transform .3s cubic-bezier(.25,.46,.45,.94);position:relative}
.modal-wide{max-width:900px}
.modal-xl{max-width:1100px}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:18px;font-weight:600}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.modal-close{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .15s}
.modal-close:hover{background:var(--bg)}

/* ─── Listing detail (Airbnb style) ─── */
.detail-page{padding:0}
.detail-gallery-grid{display:grid;grid-template-columns:1.5fr 1fr;grid-template-rows:1fr 1fr;gap:4px;border-radius:12px;overflow:hidden;max-height:460px;margin:-24px -24px 24px -24px}
.detail-gallery-grid img{width:100%;height:100%;object-fit:cover;cursor:pointer;transition:transform .3s}
.detail-gallery-grid img:hover{transform:scale(1.02)}
.detail-hero-main{grid-row:1/3}
.detail-hero-main img{height:460px}
.detail-side{display:grid;grid-template-rows:1fr 1fr;gap:4px;position:relative}
.detail-side img{height:228px}
.detail-more-btn{position:absolute;bottom:12px;right:12px;background:rgba(255,255,255,.9);color:#222;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;backdrop-filter:blur(4px);border:none;box-shadow:0 2px 6px rgba(0,0,0,.1);transition:all .2s}
.detail-more-btn:hover{background:#fff}
.detail-single-img img{width:100%;max-height:420px;object-fit:cover;margin:-24px -24px 24px -24px;width:calc(100% + 48px);border-radius:0}
.detail-body{display:flex;gap:48px}
.detail-main{flex:1;min-width:0}
.detail-sidebar{width:380px;flex-shrink:0}
.detail-header{margin-bottom:16px}
.detail-title{font-size:26px;font-weight:600;line-height:1.2;margin-bottom:6px}
.detail-meta{display:flex;align-items:center;gap:8px;font-size:15px;color:var(--text);flex-wrap:wrap}
.detail-rating{font-weight:600}
.detail-reviews{text-decoration:underline;cursor:pointer;font-weight:500}
.detail-meta .dot{color:var(--text-light)}
.detail-location{text-decoration:underline;cursor:pointer;font-weight:500}
.detail-type-line{font-size:15px;color:var(--text);margin-top:6px}
.detail-features{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:4px 0}
.detail-feature{display:flex;align-items:center;gap:10px;font-size:15px}
.feature-icon{font-size:20px;width:24px;text-align:center;flex-shrink:0}
.detail-description p{font-size:15px;line-height:1.5;color:var(--text)}
.detail-amenities-section h3,.detail-description h3,.detail-reviews-section h3{font-size:20px;font-weight:600;margin-bottom:16px}
.detail-amenities-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-amenity{font-size:15px;padding:4px 0}
.detail-divider{border:none;border-top:1px solid var(--border);margin:24px 0}

/* Booking card */
.booking-card{border:1px solid var(--border);border-radius:12px;padding:24px;box-shadow:0 6px 20px rgba(0,0,0,.08);position:sticky;top:80px}
.booking-card .price-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.booking-card .price-amount{font-size:22px;font-weight:700}
.booking-card .price-night{font-size:15px;color:var(--text-light);font-weight:400}
.booking-card .price-rating{font-size:15px;font-weight:500}
.date-picker{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
.date-picker-row{display:flex}
.date-picker-row:first-child{border-bottom:1px solid var(--border)}
.date-field{flex:1;padding:10px 14px}
.date-field:first-child{border-right:1px solid var(--border)}
.date-field label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--text-light);margin-bottom:2px}
.date-field input,.guest-field select{width:100%;border:none;padding:4px 0;font-size:14px;font-weight:500;color:var(--text);background:transparent;outline:none;font-family:inherit}
.guest-field{border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:14px}
.guest-field label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--text-light);margin-bottom:2px}
.guest-field select{padding:0;cursor:pointer;width:100%}
.btn-reserve{width:100%;padding:14px;font-size:16px;font-weight:600;border-radius:8px}
.booking-note{text-align:center;font-size:12px;color:var(--text-light);margin-top:10px}
.price-breakdown{font-size:14px;margin-top:16px}
.price-breakdown .price-line{display:flex;justify-content:space-between;margin-bottom:8px;padding:0}
.price-breakdown .price-line a{color:var(--text);text-decoration:underline;cursor:pointer}
.price-breakdown .price-total{display:flex;justify-content:space-between;font-weight:700;font-size:16px;padding-top:14px;border-top:1px solid var(--border);margin-top:4px}
.price-breakdown-empty{text-align:center;font-size:13px;color:var(--text-light);padding:12px 0 4px}

/* Reviews */
.detail-reviews-list{display:flex;flex-direction:column;gap:16px}
.detail-review{display:flex;gap:12px}
.review-avatar{width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0}
.review-name{font-weight:600;font-size:14px}
.review-date{font-size:12px;color:var(--text-light);margin-bottom:4px}
.review-rating{color:var(--primary);font-size:13px;letter-spacing:1px}
.review-comment{font-size:14px;margin-top:4px;line-height:1.4;color:var(--text)}

/* ─── Auth ─── */
.auth-form{display:flex;flex-direction:column;gap:14px}
.auth-form label{font-weight:500;font-size:14px}
.auth-form .switch{text-align:center;font-size:14px;color:var(--text-light);margin-top:4px}
.auth-form .switch a{color:var(--primary);font-weight:500;cursor:pointer}

/* ─── Host dashboard ─── */
.host-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card-bg);border-radius:var(--radius);padding:20px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border);transition:transform .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-card .stat-value{font-size:30px;font-weight:800;color:var(--primary);letter-spacing:-.5px}
.stat-card .stat-label{font-size:13px;color:var(--text-light);margin-top:4px;font-weight:500}
.tabs{display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:var(--radius-sm);margin-bottom:24px;width:fit-content;border:1px solid var(--border)}
.tab{padding:9px 22px;border-radius:6px;font-weight:500;font-size:14px;color:var(--text-light);transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab-content{display:none}
.tab-content.active{display:block}
.empty-state{text-align:center;padding:60px 24px;color:var(--text-light)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:18px;color:var(--text);margin-bottom:6px}
.host-table{width:100%;border-collapse:collapse;font-size:14px}
.host-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);color:var(--text-light);font-weight:500;font-size:13px}
.host-table td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle}
.host-table .thumb{width:48px;height:36px;border-radius:4px;object-fit:cover}
.host-table .status{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:500}
.status-pending{background:#fef3c7;color:#92400e}
.status-confirmed{background:#d1fae5;color:#065f46}
.status-cancelled{background:#fee2e2;color:#991b1b}
.status-completed{background:#dbeafe;color:#1e40af}

/* ─── Listing editor form ─── */
.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.editor-grid .full{grid-column:1/-1}
.editor-grid label{font-weight:500;font-size:13px;margin-bottom:4px;display:block}
.editor-grid input,.editor-grid select,.editor-grid textarea{transition:border-color .2s,box-shadow .2s}
.editor-grid input:focus,.editor-grid select:focus,.editor-grid textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,56,92,.1)}
.editor-section-title{font-size:15px;font-weight:600;margin-bottom:8px;margin-top:4px;color:var(--text)}
.room-config{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:8px}
.room-config label{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;background:var(--bg);font-size:13px;font-weight:500}
.room-config label:hover{border-color:var(--primary)}
.room-config label .config-icon{font-size:22px}
.room-config input{width:60px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:6px;font-size:14px;margin-top:2px}
.room-config input:focus{border-color:var(--primary);outline:none}

/* ─── Upload zone ─── */
.upload-zone{border:2px dashed #ddd;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);position:relative}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:#fff5f6}
.upload-zone .upload-icon{font-size:40px;display:block;margin-bottom:8px}
.upload-zone .upload-text{font-size:15px;font-weight:600;color:var(--text)}
.upload-zone .upload-sub{font-size:13px;color:var(--text-light);margin-top:4px}
.upload-zone input[type=file]{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}
.upload-bar{display:flex;gap:8px;margin-top:12px;align-items:center}
.upload-bar .file-count{font-size:13px;color:var(--text-light);flex:1}
.image-previews{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.image-previews .preview-item{position:relative;width:96px;height:72px;border-radius:8px;overflow:hidden;border:2px solid var(--border);transition:all .2s}
.image-previews .preview-item:hover{border-color:var(--primary)}
.image-previews .preview-item img{width:100%;height:100%;object-fit:cover;display:block}
.image-previews .preview-item .remove-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .2s}
.image-previews .preview-item:hover .remove-btn{opacity:1}

/* ─── Amenity pills ─── */
.amenity-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;margin-bottom:6px}
.amenity-pill{padding:8px 16px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;transition:all .2s;background:#fff;color:var(--text-light);user-select:none}
.amenity-pill:hover{border-color:var(--primary);color:var(--primary)}
.amenity-pill.selected{background:var(--primary);border-color:var(--primary);color:#fff}

/* ─── Profile ─── */
.profile-info{padding:20px 0}
.profile-info .field{margin-bottom:16px}
.profile-info .field label{font-size:12px;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.profile-info .field p{font-size:16px;font-weight:500;margin-top:2px}

/* ─── Responsive ─── */
@media(max-width:768px){
  header{padding:0 16px}
  .hero h1{font-size:28px}
  .hero p{font-size:15px}
  .listings-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .mobile-search{display:block}
  .hero .search-box{display:none}
  .detail-gallery-grid{grid-template-columns:1fr;max-height:none;margin:-16px -16px 16px -16px}
  .detail-gallery-grid img{height:220px!important}
  .detail-hero-main{grid-row:auto}
  .detail-side{display:none}
  .detail-single-img img{max-height:260px;margin:-16px -16px 16px -16px;width:calc(100% + 32px)}
  .detail-body{flex-direction:column;gap:24px}
  .detail-sidebar{width:100%}
  .booking-card{position:static;box-shadow:none;border:1px solid var(--border)}
  .detail-title{font-size:22px}
  .detail-features{grid-template-columns:1fr 1fr;gap:12px}
  .detail-amenities-grid{grid-template-columns:1fr}
  .detail-divider{margin:18px 0}
  .host-stats{grid-template-columns:repeat(2,1fr)}
  .editor-grid{grid-template-columns:1fr}
  .room-config{grid-template-columns:repeat(2,1fr)}
  .modal-wide,.modal-xl{max-width:100%}
  .modal{max-width:100%;border-radius:12px 12px 0 0;max-height:95vh;margin-top:auto}
  .modal-overlay{align-items:flex-end}
  .host-table{font-size:12px}
  .host-table th,.host-table td{padding:8px 6px}
  .section-header h2{font-size:20px}
}

/* ─── Toast ─── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius-sm);color:#fff;font-weight:500;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:slideIn .3s ease,slideOut .3s ease 4.7s forwards}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
.toast.success{background:#10b981}
.toast.error{background:#ef4444}
.toast.info{background:var(--primary)}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="/" onclick="home()"><img src="/image-cover.png" alt="ONETOONE.booking"></a>
    <div class="header-right">
      <button class="btn-ghost btn-sm" id="becomeHostBtn" onclick="becomeHost()">Devenez hôte</button>
      <div class="user-menu" id="userMenu">
        <button class="user-btn" onclick="toggleDropdown()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h11A1.5 1.5 0 0 1 15 2.5v11a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 13.5v-11z"/></svg>
          <div class="avatar" id="avatarDisplay">&#9783;</div>
        </button>
        <div class="dropdown" id="dropdown">
          <button class="dropdown-item" id="loginBtn" onclick="showAuth()">Connexion</button>
          <button class="dropdown-item" id="signupBtn" onclick="showAuth(true)">Inscription</button>
          <hr id="guestDivider">
          <div id="authItems" style="display:none">
            <button class="dropdown-item" onclick="showProfile()">&#128100; Profil</button>
            <button class="dropdown-item" onclick="showMyBookings()">&#128197; Mes réservations</button>
            <hr>
            <button class="dropdown-item" id="hostDropdownBtn" style="display:none" onclick="showHostDashboard()">&#127968; Tableau de bord hôte</button>
            <button class="dropdown-item" id="clientModeBtn" style="display:none" onclick="toggleClientMode()">&#128100; Mode client</button>
            <button class="dropdown-item" onclick="becomeHost()">&#127958; Devenez hôte</button>
            <hr>
            <button class="dropdown-item" onclick="logout()">&#128682; Déconnexion</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<div id="verifyBanner" class="verify-banner" style="display:none">
  &#128994; Vérifiez votre email pour activer toutes les fonctionnalités.
  <a onclick="resendVerification()">Renvoyer l'email</a>
</div>

<div class="mobile-search">
  <div class="search-box">
    <input placeholder="Où allez-vous ?" id="mobileSearchInput" onkeydown="if(event.key==='Enter')doSearch(document.getElementById('mobileSearchInput').value)">
    <button onclick="doSearch(document.getElementById('mobileSearchInput').value)">&#128269;</button>
  </div>
</div>

<div class="hero">
  <h1>Voyagez chez ONETOONE</h1>
  <p>Réservez des logements uniques partout en France, directement auprès d'hôtes passionnés.</p>
  <div class="search-box">
    <input placeholder="Où allez-vous ?" id="searchInput" onkeydown="if(event.key==='Enter')doSearch(this.value)">
    <button onclick="doSearch(document.getElementById('searchInput').value)">Rechercher</button>
  </div>
</div>

<div class="categories">
  <div class="categories-inner" id="categories"></div>
</div>

<main id="main">
  <div class="section-header">
    <h2 id="sectionTitle">Logements populaires</h2>
    <div class="filter-bar" id="filterBar">
      <button class="btn btn-outline btn-sm" onclick="sortListings('rating')">&#9733; Mieux notés</button>
      <button class="btn btn-outline btn-sm" onclick="sortListings('price')">&#36; Prix croissant</button>
      <button class="btn btn-outline btn-sm" onclick="sortListings('newest')">&#128197; Plus récents</button>
    </div>
  </div>
  <div class="listings-grid" id="listingsGrid"></div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API = 'https://onetoonebooking.onrender.com'
let state = { user: null, token: null, listings: [], currentListing: null, currentSort: 'rating', currentCategory: null, currentSearch: '' }
let clientMode = false

/* ─── Utils ─── */
function toast(msg, type = 'info') {
  const c = document.getElementById('toastContainer')
  const t = document.createElement('div')
  t.className = `toast ${type}`
  t.textContent = msg
  c.appendChild(t)
  setTimeout(() => t.remove(), 5000)
}

async function safeJson(res) {
  const text = await res.text()
  try { return JSON.parse(text) } catch { throw new Error(text || `Erreur ${res.status}`) }
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' })
}

function plural(n, s) { return n > 1 ? s + 's' : s }

/* ─── Auth ─── */
function loadAuth() {
  try {
    const t = localStorage.getItem('token')
    const u = JSON.parse(localStorage.getItem('user'))
    if (t && u) { state.token = t; state.user = u; updateUI() }
  } catch {}
}

function updateUI() {
  const u = state.user
  document.getElementById('avatarDisplay').textContent = u ? u.name.charAt(0).toUpperCase() : '☰'
  document.getElementById('loginBtn').style.display = u ? 'none' : ''
  document.getElementById('signupBtn').style.display = u ? 'none' : ''
  document.getElementById('guestDivider').style.display = u ? 'none' : ''
  document.getElementById('authItems').style.display = u ? '' : 'none'
  document.getElementById('hostDropdownBtn').style.display = u && u.isHost && !clientMode ? '' : 'none'
  document.getElementById('clientModeBtn').style.display = u && u.isHost ? '' : 'none'
  document.getElementById('clientModeBtn').innerHTML = clientMode ? '&#127968; Mode hôte' : '&#128100; Mode client'
  const banner = document.getElementById('verifyBanner')
  if (u && !u.verified) { banner.style.display = 'flex' } else { banner.style.display = 'none' }
}

/* ─── Auth modal ─── */
function showAuth(isSignup = false) {
  closeDropdown()
  const mode = isSignup ? 'signup' : 'login'
  showModal(
    mode === 'signup' ? 'Créer un compte' : 'Connexion',
    `<form class="auth-form" onsubmit="handleAuth(event, '${mode}')">
      ${mode === 'signup' ? `<label>Nom</label><input name="name" placeholder="Votre nom" required>` : ''}
      <label>Email</label><input type="email" name="email" placeholder="vous@exemple.fr" required>
      <label>Mot de passe</label><input type="password" name="password" placeholder="Votre mot de passe" minlength="4" required>
      ${mode === 'signup' ? '<label>Confirmer le mot de passe</label><input type="password" name="confirmPassword" placeholder="Confirmez votre mot de passe" minlength="4" required>' : ''}
      <button class="btn btn-primary" style="width:100%;margin-top:4px">${mode === 'signup' ? 'Inscription' : 'Connexion'}</button>
      <div class="switch">
        ${mode === 'signup' ? 'Déjà un compte ? <a onclick="showAuth(false)">Connectez-vous</a>' : 'Pas de compte ? <a onclick="showAuth(true)">Inscrivez-vous</a>'}
      </div>
    </form>`,
    ''
  )
}

async function handleAuth(e, mode) {
  e.preventDefault()
  const fd = new FormData(e.target)
  const body = mode === 'signup'
    ? { name: fd.get('name'), email: fd.get('email'), password: fd.get('password'), confirmPassword: fd.get('confirmPassword') }
    : { email: fd.get('email'), password: fd.get('password') }
  try {
    const r = await fetch(`${API}/api/auth/${mode}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
    const d = await safeJson(r)
    if (!r.ok) {
      if (d.error === 'Email déjà utilisé') { closeModal(); toast('Email déjà utilisé — connectez-vous', 'info'); setTimeout(() => showAuth(false), 500); return }
      throw new Error(d.error || 'Erreur authentification')
    }
    state.token = d.token; state.user = d.user
    localStorage.setItem('token', d.token); localStorage.setItem('user', JSON.stringify(d.user))
    updateUI(); closeModal(); toast(mode === 'signup' ? 'Compte créé !' : 'Connecté !', 'success')
    loadListings()
  } catch (err) { toast(err.message, 'error') }
}

async function resendVerification() {
  try {
    const r = await fetch(`${API}/api/auth/resend-verification`, { method: 'POST', headers: { 'Authorization': `Bearer ${state.token}` } })
    const d = await safeJson(r)
    if (!r.ok) throw new Error(d.error || 'Erreur renvoi')
    toast(d.message, 'success')
  } catch (err) { toast(err.message, 'error') }
}

function logout() {
  closeDropdown()
  state.token = null; state.user = null
  localStorage.removeItem('token'); localStorage.removeItem('user')
  updateUI(); toast('Déconnecté', 'info')
  if (document.getElementById('hostDashboard')?.style.display !== 'none') home()
}

async function becomeHost() {
  if (!state.user) { showAuth(); return }
  if (state.user.isHost) { showHostDashboard(); return }
  closeDropdown()
  showModal('Devenir hôte',
    `<p style="margin-bottom:16px">Inscrivez-vous en tant qu'hôte pour publier vos logements et gérer vos réservations.</p>
    <form class="auth-form" onsubmit="handleBecomeHost(event)">
      <label>Téléphone (optionnel)</label><input name="phone" placeholder="06 xx xx xx xx">
      <p style="font-size:13px;color:var(--text-light)">En devenant hôte, vous acceptez de partager vos annonces sur notre plateforme.</p>
      <button class="btn btn-primary" style="width:100%">Devenir hôte</button>
    </form>`, '')
}

async function handleBecomeHost(e) {
  e.preventDefault()
  const phone = e.target.phone.value
  try {
    const r = await fetch(`${API}/api/auth/host`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.token}` }, body: JSON.stringify({ phone }) })
    const d = await safeJson(r)
    if (!r.ok) {
      if (d.needsVerification) {
        closeModal(); toast('Veuillez d\'abord vérifier votre email.', 'info')
        resendVerification()
      } else { throw new Error(d.error) }
      return
    }
    state.token = d.token; state.user = d.user
    localStorage.setItem('token', d.token); localStorage.setItem('user', JSON.stringify(d.user))
    updateUI(); closeModal(); toast('Vous êtes maintenant hôte !', 'success')
    showHostDashboard()
  } catch (err) { toast(err.message, 'error') }
}

function toggleClientMode() {
  clientMode = !clientMode
  closeDropdown()
  if (clientMode) { home(); toast('Mode client activé', 'info') }
  else { showHostDashboard() }
  updateUI()
}

/* ─── Dropdown ─── */
function toggleDropdown() { document.getElementById('dropdown').classList.toggle('open') }
function closeDropdown() { document.getElementById('dropdown').classList.remove('open') }
document.addEventListener('click', e => { if (!e.target.closest('.user-menu')) closeDropdown() })

/* ─── Modal ─── */
function showModal(title, body, footer = '', wide = false, extraClass = '') {
  document.getElementById('modalTitle').textContent = title
  document.getElementById('modalBody').innerHTML = body
  document.getElementById('modalFooter').innerHTML = footer
  document.getElementById('modal').className = `modal${wide ? ' modal-wide' : ''}${extraClass ? ' ' + extraClass : ''}`
  document.getElementById('modalOverlay').classList.add('open')
  document.body.style.overflow = 'hidden'
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open')
  document.body.style.overflow = ''
  setTimeout(() => { document.getElementById('modalTitle').textContent = 'Modal'; document.getElementById('modalBody').innerHTML = ''; document.getElementById('modalFooter').innerHTML = '' }, 200)
}
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal() })

/* ─── Home ─── */
function home() {
  state.currentCategory = null; state.currentSearch = ''
  const main = document.getElementById('main')
  main.innerHTML = `
    <div class="section-header">
      <h2 id="sectionTitle">Logements populaires</h2>
      <div class="filter-bar" id="filterBar">
        <button class="btn btn-outline btn-sm" onclick="sortListings('rating')">&#9733; Mieux notés</button>
        <button class="btn btn-outline btn-sm" onclick="sortListings('price')">&#36; Prix croissant</button>
        <button class="btn btn-outline btn-sm" onclick="sortListings('newest')">&#128197; Plus récents</button>
      </div>
    </div>
    <div class="listings-grid" id="listingsGrid"></div>
  `
  loadListings(); loadCategories()
}

/* ─── Categories ─── */
async function loadCategories() {
  try {
    const r = await fetch(`${API}/api/categories`)
    const cats = await safeJson(r)
    if (!r.ok) return
    const icons = { maisons:'🏠', 'sejour-nature':'🌿', montagne:'⛰️', plage:'🏖️', ville:'🏙️', camping:'🏕️', piscine:'🏊', vignobles:'🍷', insolite:'✨', arctique:'❄️' }
    const labels = { maisons:'Maisons', 'sejour-nature':'Séjour nature', montagne:'Montagne', plage:'Plage', ville:'Ville', camping:'Camping', piscine:'Piscine', vignobles:'Vignobles', insolite:'Insolite', arctique:'Arctique' }
    const c = document.getElementById('categories')
    c.innerHTML = `<button class="cat-btn active" data-cat="" onclick="filterCategory('', this)"><span class="cat-icon">🌟</span>Tout</button>`
    cats.forEach(cat => {
      c.innerHTML += `<button class="cat-btn" data-cat="${cat.category}" onclick="filterCategory('${cat.category}', this)"><span class="cat-icon">${icons[cat.category]||'📍'}</span>${labels[cat.category]||cat.category}</button>`
    })
  } catch {}
}

function filterCategory(cat, el) {
  state.currentCategory = cat
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'))
  if (el) el.classList.add('active')
  document.getElementById('sectionTitle').textContent = cat ? (el ? el.textContent.trim() : cat) : 'Logements populaires'
  loadListings()
}

function doSearch(q) {
  state.currentSearch = q
  state.currentCategory = null
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'))
  document.querySelector('.cat-btn:first-child')?.classList.add('active')
  document.getElementById('sectionTitle').textContent = q ? `Résultats pour "${q}"` : 'Logements populaires'
  loadListings()
}

function sortListings(sort) {
  state.currentSort = sort
  loadListings()
}

async function loadListings() {
  const grid = document.getElementById('listingsGrid')
  if (!grid) return
  grid.innerHTML = Array(8).fill(0).map(() =>
    `<div class="listing-card skeleton-card"><div class="skeleton-img skeleton"></div><div class="card-body"><div class="skeleton-line skeleton"></div><div class="skeleton-line skeleton"></div></div></div>`
  ).join('')
  try {
    const params = new URLSearchParams({ sort: state.currentSort, limit: 50 })
    if (state.currentCategory) params.set('category', state.currentCategory)
    if (state.currentSearch) params.set('search', state.currentSearch)
    const r = await fetch(`${API}/api/listings?${params}`)
    const data = await safeJson(r)
    if (!r.ok) throw new Error(data.error || 'Erreur chargement')
    if (!Array.isArray(data)) throw new Error('Réponse invalide du serveur')
    const listings = data
    if (listings.length) console.log(`[loadListings] first listing images:`, listings[0].images)
    state.listings = listings
    if (!listings.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text-light)">Aucun logement trouvé</div>'; return }
    grid.innerHTML = listings.map(l => `
      <div class="listing-card fade-in" onclick="showListingDetail('${l.id}')">
        <div class="img-wrap">
          ${l.superhost ? '<div class="superhost-badge">Superhost</div>' : ''}
          <img src="${l.images?.[0]||'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=400&h=300&fit=crop'}" loading="lazy" onload="this.classList.add('loaded')" onerror="this.src='https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=400&h=300&fit=crop';this.classList.add('loaded')">
        </div>
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="card-title">${l.title}</div>
            <div class="card-rating">&#9733; ${l.rating}</div>
          </div>
          <div class="card-sub">${l.city} · ${l.type}</div>
          <div class="card-price">${l.price}€<span> / nuit</span></div>
        </div>
      </div>
    `).join('')
    requestAnimationFrame(() => { document.querySelectorAll('.fade-in').forEach((el, i) => setTimeout(() => el.classList.add('visible'), i * 40)) })
  } catch (err) { grid.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-light)">Erreur de chargement</div>'; toast(err.message, 'error') }
}

let currentDetailListing = null

function buildGalleryHtml(images, title) {
  const count = images?.length || 0
  const fallback = 'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688'
  if (!count) return `<div class="detail-single-img"><img src="${fallback}?w=1000&h=500&fit=crop" alt="${title}"></div>`
  if (count === 1) return `<div class="detail-single-img"><img src="${images[0]}" alt="${title}"></div>`
  if (count === 2) return `<div class="detail-gallery-grid">
    <div class="detail-hero-main"><img src="${images[0]}" alt="${title}"></div>
    <div class="detail-side"><img src="${images[1]}" alt="${title}"></div>
  </div>`
  return `<div class="detail-gallery-grid">
    <div class="detail-hero-main"><img src="${images[0]}" alt="${title}"></div>
    <div class="detail-side">
      <img src="${images[1]}" alt="${title}">
      <img src="${images[2]}" alt="${title}">
      ${count > 3 ? `<div class="detail-more-btn" onclick="showAllPhotos('${encodeURIComponent(JSON.stringify(images))}')">${count-3}+ photos</div>` : ''}
    </div>
  </div>`
}

function showAllPhotos(json) {
  const images = JSON.parse(decodeURIComponent(json))
  showModal('Toutes les photos', `<div style="display:flex;flex-direction:column;gap:12px">${images.map(u => `<img src="${u}" style="width:100%;border-radius:8px">`).join('')}</div>`, '', true)
}

function updatePricePreview(form) {
  const checkIn = form.querySelector('[name="checkIn"]').value
  const checkOut = form.querySelector('[name="checkOut"]').value
  const price = parseFloat(form.dataset.price)
  const el = form.querySelector('.price-breakdown')
  if (!checkIn || !checkOut || !price || checkOut <= checkIn) {
    if (el) el.innerHTML = '<div class="price-breakdown-empty">Ajoutez vos dates pour obtenir le prix total</div>'
    return
  }
  const nights = Math.round((new Date(checkOut) - new Date(checkIn)) / (1000 * 60 * 60 * 24))
  const subtotal = nights * price
  const serviceFee = Math.round(subtotal * 0.12)
  const total = subtotal + serviceFee
  el.innerHTML = `
    <div class="price-line">${price}€ × ${nights} ${nights > 1 ? 'nuits' : 'nuit'} <span>${subtotal}€</span></div>
    <div class="price-line">Frais de service <span>${serviceFee}€</span></div>
    <div class="price-total">Total <span>${total}€</span></div>
  `
}

async function showListingDetail(id) {
  try {
    const r = await fetch(`${API}/api/listings/${id}`)
    const l = await safeJson(r)
    currentDetailListing = l
    const images = l.images || []
    const galleryHtml = buildGalleryHtml(images, l.title)
    const today = new Date().toISOString().split('T')[0]

    const features = [
      { icon: '👤', count: l.guests, label: 'voyageur' + (l.guests > 1 ? 's' : '') },
      { icon: '🛏️', count: l.bedrooms, label: 'chambre' + (l.bedrooms > 1 ? 's' : '') },
      { icon: '🛌', count: l.beds, label: 'lit' + (l.beds > 1 ? 's' : '') },
      { icon: '🛁', count: l.baths, label: 'salle de bain' + (l.baths > 1 ? 's' : '') }
    ].filter(f => f.count > 0)

    const amenitiesHtml = l.amenities?.length
      ? l.amenities.map(a => `<div class="detail-amenity">✓ ${a}</div>`).join('')
      : ''

    const reviewsHtml = l.reviews?.length
      ? l.reviews.slice(0, 5).map(r => `
        <div class="detail-review">
          <div class="review-avatar">${(r.userName || '?').charAt(0)}</div>
          <div>
            <div class="review-name">${r.userName || 'Anonyme'}</div>
            <div class="review-date">${formatDate(r.createdAt)}</div>
            <div class="review-rating">${'★'.repeat(Math.round(r.rating))}${'☆'.repeat(5 - Math.round(r.rating))}</div>
            ${r.comment ? `<p class="review-comment">${r.comment}</p>` : ''}
          </div>
        </div>
      `).join('')
      : ''

    const guestOptions = Array.from({length: l.guests || 1}, (_, i) =>
      `<option value="${i+1}">${i+1} voyageur${i > 0 ? 's' : ''}</option>`
    ).join('')

    const bodyHtml = `
      ${galleryHtml}
      <div class="detail-body">
        <div class="detail-main">
          <div class="detail-header">
            <h1 class="detail-title">${l.title}</h1>
            <div class="detail-meta">

async function handleBooking(e, listingId) {
  e.preventDefault()
  if (!state.user) { showAuth(); return }
  const fd = new FormData(e.target)
  const checkIn = fd.get('checkIn'); const checkOut = fd.get('checkOut')
  if (checkOut <= checkIn) { toast('Le départ doit être après l\'arrivée', 'error'); return }
  try {
    const r = await fetch(`${API}/api/bookings`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.token}` }, body: JSON.stringify({ listingId, checkIn, checkOut, guests: Number(fd.get('guests'))||1, message: '' }) })
    const d = await safeJson(r)
    if (!r.ok) throw new Error(d.error || 'Erreur réservation')
    toast(d.message, 'success')
    closeModal()
  } catch (err) { toast(err.message, 'error') }
}

async function loadHostData() {
  try {
    const [statsR, listingsR, bookingsR] = await Promise.all([
      fetch(`${API}/api/host/stats`, { headers: { 'Authorization': `Bearer ${state.token}` } }),
      fetch(`${API}/api/host/listings`, { headers: { 'Authorization': `Bearer ${state.token}` } }),
      fetch(`${API}/api/host/bookings`, { headers: { 'Authorization': `Bearer ${state.token}` } })
    ])
    const stats = await safeJson(statsR)
    if (!statsR.ok) throw new Error(stats.error || 'Erreur stats')
    const listings = await safeJson(listingsR)
    if (!listingsR.ok) throw new Error(listings.error || 'Erreur logements')
    const bookings = await safeJson(bookingsR)
    if (!bookingsR.ok) throw new Error(bookings.error || 'Erreur réservations')

    document.getElementById('hostStats').innerHTML = `
      <div class="stat-card"><div class="stat-value">${stats.listingCount}</div><div class="stat-label">Logements</div></div>
      <div class="stat-card"><div class="stat-value">${stats.pendingCount}</div><div class="stat-label">En attente</div></div>
      <div class="stat-card"><div class="stat-value">${stats.confirmedCount}</div><div class="stat-label">Confirmées</div></div>
      <div class="stat-card"><div class="stat-value">${stats.totalRevenue}€</div><div class="stat-label">Revenus</div></div>
    `
    renderHostListings(listings)
    renderHostBookings(bookings)
  } catch (err) { toast(err.message, 'error') }
}

async function handleListingSubmit(e, id) {
  e.preventDefault()
  const fd = new FormData(e.target)
  const imgRaw = fd.get('images') || ''
  const images = imgRaw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean)
  console.log(`[listingSubmit] raw textarea length=${imgRaw.length}, parsed images:`, images)
  const body = {
    title: fd.get('title'), description: fd.get('description'),
    type: fd.get('type'), category: fd.get('category'),
    city: fd.get('city'), country: fd.get('country'),
    price: Number(fd.get('price')), guests: Number(fd.get('guests')),
    bedrooms: Number(fd.get('bedrooms')), beds: Number(fd.get('beds')), baths: Number(fd.get('baths')),
    images,
    amenities: (fd.get('amenities')||'').split(/,\s*/).map(s => s.trim()).filter(Boolean),
    lat: fd.get('lat') ? Number(fd.get('lat')) : null,
    lng: fd.get('lng') ? Number(fd.get('lng')) : null
  }
  try {
    const method = id ? 'PUT' : 'POST'
    const url = id ? `${API}/api/listings/${id}` : `${API}/api/listings`
    const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.token}` }, body: JSON.stringify(body) })
    const d = await safeJson(r)
    if (!r.ok) throw new Error(d.error || 'Erreur enregistrement')
    toast(d.message, 'success'); closeModal(); loadHostData()
  } catch (err) { toast(err.message, 'error') }
}

let uploadedUrls = []

function renderLocalPreviews(files) {
  const container = document.getElementById('imagePreviews')
  container.innerHTML = ''
  Array.from(files).forEach(f => {
    const url = URL.createObjectURL(f)
    container.innerHTML += `<div class="preview-item"><img src="${url}"><span style="position:absolute;bottom:4px;right:4px;font-size:10px;background:rgba(0,0,0,.5);color:#fff;padding:2px 6px;border-radius:4px">local</span></div>`
  })

document.addEventListener('change', function(e) {
  if (e.target.id === 'imageInput') {
    const files = e.target.files
    const count = files.length
    document.getElementById('fileCount').textContent = count + ' fichier(s) sélectionné(s)'
    document.getElementById('uploadBar').style.display = count ? '' : 'none'
    renderLocalPreviews(files)
  }
})

document.addEventListener('dragover', function(e) {
  const zone = e.target.closest('.upload-zone')
  if (zone) { e.preventDefault(); zone.classList.add('dragover') }
})
document.addEventListener('dragleave', function(e) {
  const zone = e.target.closest('.upload-zone')
  if (zone) { e.preventDefault(); zone.classList.remove('dragover') }
})
document.addEventListener('drop', function(e) {
  const zone = e.target.closest('.upload-zone')
  if (zone) {
    e.preventDefault(); zone.classList.remove('dragover')
    const input = document.getElementById('imageInput')
    input.files = e.dataTransfer.files
    const event = new Event('change', { bubbles: true })
    input.dispatchEvent(event)
  }
})

async function uploadImages() {
  const input = document.getElementById('imageInput')
  if (!input.files.length) { toast('Sélectionnez des images', 'error'); return }
  const progress = document.getElementById('uploadProgress')
  progress.style.display = 'block'
  const total = input.files.length
  const urls = []
  for (let i = 0; i < total; i++) {
    progress.textContent = `Upload ${i+1}/${total}...`
    const formData = new FormData()
    formData.append('image', input.files[i])
    try {
      const r = await fetch(`${API}/api/upload`, { method: 'POST', headers: { 'Authorization': `Bearer ${state.token}` }, body: formData })
      const d = await safeJson(r)
      if (!r.ok) throw new Error(d.error || 'Erreur upload')
      urls.push(d.url)
    } catch (err) { toast(`Erreur image ${i+1}: ${err.message}`, 'error') }
  }
  console.log(`[upload] got ${urls.length} URLs from Cloudinary:`, urls)
  progress.textContent = `${urls.length} image(s) uploadée(s) !`
  setTimeout(() => { progress.style.display = 'none' }, 2000)
  uploadedUrls = [...uploadedUrls, ...urls]
  const textarea = document.getElementById('imageUrls')
  const existing = textarea.value.split(/[\n,]+/).map(s => s.trim()).filter(Boolean)
  const all = [...existing, ...urls]
  textarea.value = all.join(',\n')
  renderImagePreviews(all)
  input.value = ''
  document.getElementById('fileCount').textContent = '0 fichier(s) sélectionné(s)'
  document.getElementById('uploadBar').style.display = 'none'
}

function renderImagePreviews(urls) {
  const container = document.getElementById('imagePreviews')
  container.innerHTML = urls.map(u =>
    `<div class="preview-item"><img src="${u}"><button type="button" class="remove-btn" onclick="removeImageByUrl('${u}')">&times;</button></div>`
  ).join('')
}

function removeImageByUrl(url) {
  const textarea = document.getElementById('imageUrls')
  let urls = textarea.value.split(/[\n,]+/).map(s => s.trim()).filter(Boolean)
  urls = urls.filter(u => u !== url)
  textarea.value = urls.join(',\n')
  uploadedUrls = uploadedUrls.filter(u => u !== url)
  renderImagePreviews(urls)
}

/* ─── Profile ─── */
async function showProfile() {
  closeDropdown()
  if (!state.user) { showAuth(); return }
  try {
    const r = await fetch(`${API}/api/auth/me`, { headers: { 'Authorization': `Bearer ${state.token}` } })
    const u = await safeJson(r)
    if (!r.ok || !u) throw new Error(u?.error || 'Erreur profil')
    showModal('Mon profil', `
      <div class="profile-info">
        <div class="field"><label>Nom</label><p>${u.name||''}</p></div>
        <div class="field"><label>Email</label><p>${u.email||''}</p></div>
        <div class="field"><label>Email vérifié</label><p>${u.verified ? '✅ Oui' : '❌ Non'}</p></div>
        <div class="field"><label>Statut</label><p>${u.isHost ? '🏡 Hôte' : '👤 Voyageur'}</p></div>
        ${u.hostSince ? `<div class="field"><label>Hôte depuis</label><p>${formatDate(u.hostSince)}</p></div>` : ''}
        ${u.phone ? `<div class="field"><label>Téléphone</label><p>${u.phone}</p></div>` : ''}
      </div>
    `, '')
  } catch { showModal('Mon profil', '<div class="profile-info"><div class="field"><label>Nom</label><p>...</p></div></div>', '') }
}

/* ─── My Bookings ─── */
async function showMyBookings() {
  closeDropdown()
  if (!state.user) { showAuth(); return }
  try {
    const r = await fetch(`${API}/api/bookings`, { headers: { 'Authorization': `Bearer ${state.token}` } })
    const bookings = await safeJson(r)
    if (!r.ok) throw new Error(bookings.error || 'Erreur réservations')
    showModal('Mes réservations', bookings.length ? `
      <div style="display:flex;flex-direction:column;gap:12px">
        ${bookings.map(b => `
          <div style="display:flex;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm)">
            <img src="${b.images||'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=100&h=75&fit=crop'}" style="width:80px;height:60px;border-radius:6px;object-fit:cover;flex-shrink:0">
            <div style="flex:1">
              <strong>${b.title}</strong>
              <div style="font-size:13px;color:var(--text-light)">${b.city} · Hôte : ${b.hostName}</div>
              <div style="font-size:13px">${formatDate(b.checkIn)} - ${formatDate(b.checkOut)} · ${b.nights} nuits</div>
              <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
                <span style="font-weight:600">${b.totalPrice}€</span>
                <span class="status status-${b.status === 'en_attente' ? 'pending' : b.status}">${b.status === 'en_attente' ? 'En attente' : b.status.charAt(0).toUpperCase()+b.status.slice(1)}</span>
              </div>
              ${b.status === 'en_attente' || b.status === 'confirmé' ? `
                <div style="margin-top:8px;display:flex;gap:4px">
                  <button class="btn btn-danger btn-sm" onclick="cancelClientBooking('${b.id}')">Annuler</button>
                  <button class="btn btn-ghost btn-sm" style="color:#ef4444;font-size:12px;border:1px solid #fee2e2" onclick="deleteClientBooking('${b.id}')">Supprimer</button>
                </div>
              ` : `
                <div style="margin-top:8px">
                  <button class="btn btn-ghost btn-sm" style="color:#ef4444;font-size:12px;border:1px solid #fee2e2" onclick="deleteClientBooking('${b.id}')">Supprimer</button>
                </div>
              `}
            </div>
          </div>
        `).join('')}
      </div>
    ` : '<div class="empty-state"><div class="empty-icon">&#128197;</div><h3>Aucune réservation</h3><p>Vous n\'avez pas encore réservé de logement.</p></div>', '')
  } catch (err) { toast(err.message, 'error') }
}

loadListings()
loadCategories()
